workflows:
  ios-capacitor-app-store:
    name: Gillie iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic

    environment:
      node: latest
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.lavish9999.gillie"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: "com.lavish9999.gillie"

    scripts:
      - name: Install npm dependencies
        script: |
          npm install

      - name: Prepare Capacitor web assets
        script: |
          if npm run | grep -q "prepare:cap"; then
            npm run prepare:cap
          fi

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Install CocoaPods dependencies if present
        script: |
          if [ -f "ios/App/Podfile" ]; then
            cd ios/App
            pod install
          fi

      - name: Set up App Store code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build App Store IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
