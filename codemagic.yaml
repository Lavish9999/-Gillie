workflows:
  ios-capacitor-app-store:
    name: Gillie iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic

    environment:
      node: latest
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.lavish9999.gillie"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: "com.lavish9999.gillie"

    scripts:
      - name: Install npm dependencies
        script: |
          npm install

      - name: Prepare Capacitor web assets
        script: |
          if npm run | grep -q "prepare:cap"; then
            npm run prepare:cap
          fi

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Set iOS build number
        script: |
          set -euo pipefail
          build_number="${BUILD_NUMBER:-2}"
          if ! [[ "$build_number" =~ ^[0-9]+$ ]]; then
            build_number="$(date +%Y%m%d%H%M)"
          fi
          if [ "$build_number" -le 1 ]; then
            build_number="2"
          fi
          echo "Setting iOS build number to $build_number"
          cd ios/App
          xcrun agvtool new-version -all "$build_number"

      - name: Strip iOS app icon alpha
        script: |
          set -euo pipefail
          icon_dir="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          for icon in "$icon_dir"/*.png; do
            jpg="${icon}.no-alpha.jpg"
            png="${icon}.no-alpha.png"
            sips -s format jpeg "$icon" --out "$jpg"
            sips -s format png "$jpg" --out "$png"
            mv "$png" "$icon"
            rm -f "$jpg"
          done

          for icon in "$icon_dir"/*.png; do
            sips -g pixelWidth -g pixelHeight -g hasAlpha "$icon"
            if sips -g hasAlpha "$icon" | grep -q "hasAlpha: yes"; then
              echo "App icon still has alpha: $icon"
              exit 1
            fi
          done

      - name: Install CocoaPods dependencies if present
        script: |
          if [ -f "ios/App/Podfile" ]; then
            cd ios/App
            pod install
          fi

      - name: Set up App Store code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build App Store IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true