workflows:
  ios-capacitor-app-store:
    name: Gillie iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic

    environment:
      node: 22
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.lavish9999.gillie"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: "com.lavish9999.gillie"

    scripts:
      - name: Install locked npm dependencies
        script: |
          set -euo pipefail
          npm ci

      - name: Validate ship-quality source
        script: |
          set -euo pipefail
          npm run validate:ship
          grep -q "Gillie startup, motion, and compact Home fixes applied" www/phase2-polish.js
          grep -q "phase2SpeechSafe" www/phase2-polish.css
          grep -q "gillieShipPolishInstalled" www/phase3-ship.js
          grep -q "grantStarterPearls();" www/phase3-ship.js
          grep -q "current.premium && ready" www/phase3-ship.js
          grep -q "gillieLaunchHardeningInstalled" www/phase4-launch.js
          grep -q "store_prices_localized" www/phase4-launch.js
          grep -q "gilliePaywallRebuildInstalled" www/phase5-paywall.js
          grep -q "A quit plan that adapts to you" www/phase5-paywall.js
          grep -q "gp-paywall-sheet" www/phase5-paywall.js
          grep -q "gp-primary-cta" www/phase5-paywall.css
          grep -q "Gillie V1 visual foundation" www/gillie-foundation.css
          grep -q -- "--g-icon-size" www/gillie-foundation.css
          grep -q "gp-status-banner.info" www/gillie-foundation.css
          grep -q "ship-reef-plus-strip" www/phase4-launch.css
          grep -q "ship-status-scrim" www/phase3-ship.css
          grep -q 'data-gillie-phase3="true"' www/index.html
          grep -q 'data-gillie-phase4="true"' www/index.html
          grep -q 'data-gillie-phase5="true"' www/index.html
          grep -q 'data-gillie-foundation="true"' www/index.html
          grep -q 'data-gillie-v1-reef-dashboard="true"' www/index.html
          grep -q 'data-gillie-v1-reef-dashboard-styles="true"' www/index.html
          grep -q 'late-module safe' www/v1/core.js
          grep -q 'strict tab isolation' www/v1/core.js
          grep -q 'enforceViewIsolation' www/v1/core.js
          grep -q '#view-home:not(\[data-v1-active="true"\])' www/v1/v1.css
          grep -q 'PREVIEW_ENGINE = "canonical-v3-swipe"' www/v1/reef.js
          grep -q 'document.addEventListener("click", handlePreviewCapture, true)' www/v1/reef.js
          grep -q 'document.addEventListener("touchend", handlePreviewTouchEnd' www/v1/reef.js
          grep -q 'dismissPreviewWithGesture' www/v1/reef.js
          grep -q 'DASHBOARD_ENGINE = "reef-progression-v1"' www/v1/reef-dashboard.js
          grep -q 'Daily Reef Care' www/v1/reef-dashboard.js
          grep -q 'claimDailyBonus' www/v1/reef-dashboard.js
          grep -q 'Gillie V1 Reef Dashboard' www/v1/reef-dashboard.css
          grep -q '.v1-reef-vault' www/v1/reef-dashboard.css
          grep -q '"reefProgress", "moonlitReef"' www/v1/backup.js
          grep -q 'clearDiagnostics' www/index.html
          grep -q 'localStorage.clear()' www/index.html
          grep -q 'NSPrivacyAccessedAPICategoryUserDefaults' ios/App/App/PrivacyInfo.xcprivacy
          grep -q 'CA92.1' ios/App/App/PrivacyInfo.xcprivacy
          grep -q 'PrivacyInfo.xcprivacy in Resources' ios/App/App.xcodeproj/project.pbxproj
          grep -q 'TARGETED_DEVICE_FAMILY = 1;' ios/App/App.xcodeproj/project.pbxproj
          if grep -q 'TARGETED_DEVICE_FAMILY = "1,2";' ios/App/App.xcodeproj/project.pbxproj; then
            echo "Gillie V1 still targets untested universal iPhone/iPad layout"
            exit 1
          fi
          if grep -qE 'fonts\.googleapis\.com|fonts\.gstatic\.com' www/index.html; then
            echo "Native bundle still makes a third-party font request"
            exit 1
          fi
          if grep -q 'data-gillie-phase5-hotfix="true"' www/index.html; then
            echo "Legacy paywall hotfix is still injected"
            exit 1
          fi

      - name: Sync Capacitor iOS
        script: |
          set -euo pipefail
          npx cap sync ios
          grep -q 'PrivacyInfo.xcprivacy in Resources' ios/App/App.xcodeproj/project.pbxproj
          grep -q 'TARGETED_DEVICE_FAMILY = 1;' ios/App/App.xcodeproj/project.pbxproj

      - name: Remove App Store icon alpha channel
        script: |
          set -euo pipefail
          icon="ios/App/App/Assets.xcassets/AppIcon.appiconset/Icon-1024.png"
          if [ ! -f "$icon" ]; then
            echo "Missing App Store marketing icon: $icon"
            exit 1
          fi

          before_alpha="$(sips -g hasAlpha "$icon" | awk '/hasAlpha:/ {print $2}')"
          echo "Marketing icon alpha before conversion: ${before_alpha:-unknown}"

          if [ "$before_alpha" = "yes" ]; then
            tmp_jpg="${icon%.png}.opaque.jpg"
            sips -s format jpeg -s formatOptions best "$icon" --out "$tmp_jpg" >/dev/null
            sips -s format png "$tmp_jpg" --out "$icon" >/dev/null
            rm -f "$tmp_jpg"
          fi

          after_alpha="$(sips -g hasAlpha "$icon" | awk '/hasAlpha:/ {print $2}')"
          echo "Marketing icon alpha after conversion: ${after_alpha:-unknown}"
          if [ "$after_alpha" = "yes" ]; then
            echo "App Store icon still contains an alpha channel"
            exit 1
          fi

          dimensions="$(sips -g pixelWidth -g pixelHeight "$icon")"
          echo "$dimensions"
          echo "$dimensions" | grep -q 'pixelWidth: 1024'
          echo "$dimensions" | grep -q 'pixelHeight: 1024'

      - name: Set automatic iOS build number
        script: |
          set -euo pipefail
          sequence="${PROJECT_BUILD_NUMBER:-${BUILD_NUMBER:-1}}"
          case "$sequence" in
            ''|*[!0-9]*)
              echo "Codemagic build sequence is not numeric: $sequence"
              exit 1
              ;;
          esac
          build_number=$((1000 + sequence))
          echo "Using automatic iOS build number: $build_number (Codemagic project sequence: $sequence)"
          cd ios/App
          sed -i '' -E "s/CURRENT_PROJECT_VERSION = [0-9]+;/CURRENT_PROJECT_VERSION = ${build_number};/g" App.xcodeproj/project.pbxproj
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${build_number}" App/Info.plist
          echo "Info.plist CFBundleVersion: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' App/Info.plist)"
          echo "Release build settings:"
          xcodebuild -project App.xcodeproj -scheme App -configuration Release -showBuildSettings | grep -E "CURRENT_PROJECT_VERSION|MARKETING_VERSION|TARGETED_DEVICE_FAMILY"

      - name: Apply App Store Connect signing
        script: |
          set -euo pipefail
          xcode-project use-profiles

      - name: Build signed IPA
        script: |
          set -euo pipefail
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

      - name: Verify final App Store IPA
        script: |
          set -euo pipefail
          sequence="${PROJECT_BUILD_NUMBER:-${BUILD_NUMBER:-1}}"
          expected_build=$((1000 + sequence))
          ipa_path="$(find build/ios/ipa -name '*.ipa' -type f | head -n 1)"
          if [ -z "$ipa_path" ] || [ ! -f "$ipa_path" ]; then
            echo "Signed IPA was not produced"
            exit 1
          fi

          verify_dir="$(mktemp -d)"
          unzip -q "$ipa_path" -d "$verify_dir"
          app_path="$(find "$verify_dir/Payload" -maxdepth 1 -name '*.app' -type d | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "Could not locate app bundle inside IPA"
            exit 1
          fi

          actual_build="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$app_path/Info.plist")"
          bundle_id="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$app_path/Info.plist")"
          echo "IPA bundle: $bundle_id build $actual_build"
          test "$bundle_id" = "$BUNDLE_ID"
          test "$actual_build" = "$expected_build"
          test -f "$app_path/PrivacyInfo.xcprivacy"
          grep -q 'NSPrivacyAccessedAPICategoryUserDefaults' "$app_path/PrivacyInfo.xcprivacy"
          grep -q 'CA92.1' "$app_path/PrivacyInfo.xcprivacy"

          device_families="$(/usr/libexec/PlistBuddy -c 'Print :UIDeviceFamily' "$app_path/Info.plist")"
          echo "$device_families"
          echo "$device_families" | grep -q '1'
          if echo "$device_families" | grep -q '2'; then
            echo "Final IPA unexpectedly includes untested iPad support"
            exit 1
          fi

          if grep -R -qE 'fonts\.googleapis\.com|fonts\.gstatic\.com' "$app_path/public"; then
            echo "Final IPA still contains remote Google Fonts"
            exit 1
          fi
          rm -rf "$verify_dir"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
