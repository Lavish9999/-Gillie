workflows:
  ios-capacitor-app-store:
    name: Gillie iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic

    environment:
      node: latest
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.lavish9999.gillie"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        GILLIE_BUILD_NUMBER: "17"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: "com.lavish9999.gillie"

    scripts:
      - name: Install npm dependencies
        script: |
          npm install

      - name: Prepare Capacitor web assets
        script: |
          if npm run | grep -q "prepare:cap"; then
            npm run prepare:cap
          fi

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Set iOS build number
        script: |
          set -euo pipefail
          build_number="$GILLIE_BUILD_NUMBER"
          echo "Hard-setting iOS build number to $build_number"
          cd ios/App
          sed -i '' -E "s/CURRENT_PROJECT_VERSION = [0-9]+;/CURRENT_PROJECT_VERSION = ${build_number};/g" App.xcodeproj/project.pbxproj
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${build_number}" App/Info.plist
          echo "Info.plist CFBundleVersion: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' App/Info.plist)"
          echo "Release build settings:"
          xcodebuild -project App.xcodeproj -scheme App -configuration Release -showBuildSettings | grep -E "CURRENT_PROJECT_VERSION|MARKETING_VERSION"

      - name: Strip iOS app icon alpha
        script: |
          set -euo pipefail
          icon_dir="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          for icon in "$icon_dir"/*.png; do
            jpg="${icon}.no-alpha.jpg"
            png="${icon}.no-alpha.png"
            sips -s format jpeg "$icon" --out "$jpg"
            sips -s format png "$jpg" --out "$png"
            mv "$png" "$icon"
            rm -f "$jpg"
          done

          for icon in "$icon_dir"/*.png; do
            sips -g pixelWidth -g pixelHeight -g hasAlpha "$icon"
            if sips -g hasAlpha "$icon" | grep -q "hasAlpha: yes"; then
              echo "App icon still has alpha: $icon"
              exit 1
            fi
          done

      - name: Install CocoaPods dependencies if present
        script: |
          if [ -f "ios/App/Podfile" ]; then
            cd ios/App
            pod install
          fi

      - name: Set up App Store code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build App Store IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --archive-xcargs "CURRENT_PROJECT_VERSION=${GILLIE_BUILD_NUMBER}"

      - name: Verify IPA iOS build number
        script: |
          set -euo pipefail
          echo "Expected Gillie build number: $GILLIE_BUILD_NUMBER"
          echo "Project Release build settings before publish:"
          xcodebuild -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" -configuration Release -showBuildSettings | grep -E "CURRENT_PROJECT_VERSION|MARKETING_VERSION"

          ipa_path="$(find build/ios/ipa -name "*.ipa" -type f | head -n 1)"
          if [ -z "$ipa_path" ]; then
            echo "No .ipa found under build/ios/ipa"
            exit 1
          fi

          echo "Verifying uploaded IPA artifact: $ipa_path"
          rm -rf /tmp/gillie-ipa-verify
          mkdir -p /tmp/gillie-ipa-verify
          unzip -q "$ipa_path" -d /tmp/gillie-ipa-verify

          app_plist="$(find /tmp/gillie-ipa-verify/Payload -path "*.app/Info.plist" -type f | head -n 1)"
          if [ -z "$app_plist" ]; then
            echo "App Info.plist not found inside IPA Payload"
            exit 1
          fi

          short_version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$app_plist")"
          build_version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$app_plist")"
          echo "IPA CFBundleShortVersionString: $short_version"
          echo "IPA CFBundleVersion: $build_version"

          if [ "$build_version" = "1" ]; then
            echo "Refusing to publish: IPA CFBundleVersion is still 1."
            exit 1
          fi

          if [ "$build_version" != "$GILLIE_BUILD_NUMBER" ]; then
            echo "Refusing to publish: IPA CFBundleVersion $build_version does not match GILLIE_BUILD_NUMBER."
            exit 1
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
