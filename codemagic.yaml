workflows:
  ios-capacitor-app-store:
    name: Gillie iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic

    environment:
      node: 22
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.lavish9999.gillie"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: "com.lavish9999.gillie"

    scripts:
      - name: Install locked npm dependencies
        script: |
          set -euo pipefail
          npm ci

      - name: Validate ship-quality source
        script: |
          set -euo pipefail
          echo "Codemagic source ref: ${CM_BRANCH:-unknown}"
          echo "Codemagic source commit: ${CM_COMMIT:-unknown}"
          npm run validate:ship
          node scripts/validate-codemagic-source.js
          test -f www/v1/build-source.json
          grep -q 'purchase-flow-v3-production-branch' www/v1/purchase-flow.js
          grep -q 'store-pricing-v2-retryable' www/v1/store-pricing.js
          grep -q 'theme-engine-v2-multitank-level-rewards' www/v1/theme-engine.js
          grep -q 'theme-paint-v1' www/v1/theme-paint.js
          grep -q '"sourceCommit"' www/v1/build-source.json
          cat www/v1/build-source.json

      - name: Sync Capacitor iOS
        script: |
          set -euo pipefail
          npx cap sync ios
          grep -q 'PrivacyInfo.xcprivacy in Resources' ios/App/App.xcodeproj/project.pbxproj
          grep -q 'TARGETED_DEVICE_FAMILY = 1;' ios/App/App.xcodeproj/project.pbxproj
          grep -q 'GilliePurchases?.clearDiagnostics' ios/App/App/GillieBridgeViewController.swift
          grep -q 'claimPlusWelcomeBundle' ios/App/App/GilliePurchasesPlugin.swift
          grep -q 'kSecClassGenericPassword' ios/App/App/GilliePurchasesPlugin.swift
          grep -q 'CAPPluginMethod(name: "requestReview"' ios/App/App/GilliePurchasesPlugin.swift
          grep -q 'SKStoreReviewController.requestReview' ios/App/App/GilliePurchasesPlugin.swift
          grep -q 'GillieWelcomeRecoveryPlugin' ios/App/App/GillieBridgeViewController.swift
          grep -q 'recoverWelcomeBundle' ios/App/App/GillieBridgeViewController.swift

      - name: Remove App Store icon alpha channel
        script: |
          set -euo pipefail
          icon="ios/App/App/Assets.xcassets/AppIcon.appiconset/Icon-1024.png"
          if [ ! -f "$icon" ]; then
            echo "Missing App Store marketing icon: $icon"
            exit 1
          fi

          before_alpha="$(sips -g hasAlpha "$icon" | awk '/hasAlpha:/ {print $2}')"
          echo "Marketing icon alpha before conversion: ${before_alpha:-unknown}"

          if [ "$before_alpha" = "yes" ]; then
            tmp_jpg="${icon%.png}.opaque.jpg"
            sips -s format jpeg -s formatOptions best "$icon" --out "$tmp_jpg" >/dev/null
            sips -s format png "$tmp_jpg" --out "$icon" >/dev/null
            rm -f "$tmp_jpg"
          fi

          after_alpha="$(sips -g hasAlpha "$icon" | awk '/hasAlpha:/ {print $2}')"
          echo "Marketing icon alpha after conversion: ${after_alpha:-unknown}"
          if [ "$after_alpha" = "yes" ]; then
            echo "App Store icon still contains an alpha channel"
            exit 1
          fi

          dimensions="$(sips -g pixelWidth -g pixelHeight "$icon")"
          echo "$dimensions"
          echo "$dimensions" | grep -q 'pixelWidth: 1024'
          echo "$dimensions" | grep -q 'pixelHeight: 1024'

      - name: Set automatic iOS build number
        script: |
          set -euo pipefail
          sequence="${PROJECT_BUILD_NUMBER:-${BUILD_NUMBER:-1}}"
          case "$sequence" in
            ''|*[!0-9]*)
              echo "Codemagic build sequence is not numeric: $sequence"
              exit 1
              ;;
          esac
          build_number=$((1000 + sequence))
          echo "Using automatic iOS build number: $build_number (Codemagic project sequence: $sequence)"
          cd ios/App
          sed -i '' -E "s/CURRENT_PROJECT_VERSION = [0-9]+;/CURRENT_PROJECT_VERSION = ${build_number};/g" App.xcodeproj/project.pbxproj
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${build_number}" App/Info.plist
          echo "Info.plist CFBundleVersion: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' App/Info.plist)"
          echo "Release build settings:"
          xcodebuild -project App.xcodeproj -scheme App -configuration Release -showBuildSettings | grep -E "CURRENT_PROJECT_VERSION|MARKETING_VERSION|TARGETED_DEVICE_FAMILY"

      - name: Apply App Store Connect signing
        script: |
          set -euo pipefail
          xcode-project use-profiles

      - name: Build signed IPA
        script: |
          set -euo pipefail
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

      - name: Verify final App Store IPA
        script: |
          set -euo pipefail
          sequence="${PROJECT_BUILD_NUMBER:-${BUILD_NUMBER:-1}}"
          expected_build=$((1000 + sequence))
          ipa_path="$(find build/ios/ipa -name '*.ipa' -type f | head -n 1)"
          if [ -z "$ipa_path" ] || [ ! -f "$ipa_path" ]; then
            echo "Signed IPA was not produced"
            exit 1
          fi

          verify_dir="$(mktemp -d)"
          unzip -q "$ipa_path" -d "$verify_dir"
          app_path="$(find "$verify_dir/Payload" -maxdepth 1 -name '*.app' -type d | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "Could not locate app bundle inside IPA"
            exit 1
          fi

          actual_build="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$app_path/Info.plist")"
          bundle_id="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$app_path/Info.plist")"
          echo "IPA bundle: $bundle_id build $actual_build"
          test "$bundle_id" = "$BUNDLE_ID"
          test "$actual_build" = "$expected_build"
          test -f "$app_path/PrivacyInfo.xcprivacy"
          grep -q 'NSPrivacyAccessedAPICategoryUserDefaults' "$app_path/PrivacyInfo.xcprivacy"
          grep -q 'CA92.1' "$app_path/PrivacyInfo.xcprivacy"

          device_families="$(/usr/libexec/PlistBuddy -c 'Print :UIDeviceFamily' "$app_path/Info.plist")"
          echo "$device_families"
          echo "$device_families" | grep -q '1'
          if echo "$device_families" | grep -q '2'; then
            echo "Final IPA unexpectedly includes untested iPad support"
            exit 1
          fi

          require_file() {
            if [ ! -f "$1" ]; then
              echo "Final IPA verification failed: required web asset is missing from the signed bundle: $1"
              exit 1
            fi
          }
          require_marker() {
            if ! grep -Fq "$2" "$1"; then
              echo "Final IPA verification failed: $3"
              echo "  file:    $1"
              echo "  missing: $2"
              exit 1
            fi
          }
          forbid_marker() {
            if grep -Fq "$2" "$1"; then
              echo "Final IPA verification failed: $3"
              echo "  file:      $1"
              echo "  forbidden: $2"
              exit 1
            fi
          }
          pub="$app_path/public"

          require_file "$pub/v1/home-gillie.js"
          require_file "$pub/v1/home-gillie.css"
          require_file "$pub/v1/reef.js"
          require_marker "$pub/v1/home-gillie.js" 'home-gillie-direct-gills-v3' "direct-gill anatomy engine"
          require_marker "$pub/v1/home-gillie.js" 'ns.startsWith("reefpreview-")' "reef-preview namespace guard"
          require_marker "$pub/v1/home-gillie.js" 'data-home-gill="left-upper"' "left gill frond markup"
          require_marker "$pub/v1/home-gillie.js" 'data-home-gill="right-lower"' "right gill frond markup"
          gill_count="$(grep -o 'data-home-gill=' "$pub/v1/home-gillie.js" | wc -l | tr -d ' ')"
          if [ "$gill_count" != "6" ]; then
            echo "Final IPA verification failed: Gillie must have exactly 6 direct gill fronds, found $gill_count"
            exit 1
          fi
          require_marker "$pub/v1/home-gillie.js" 'window.axoSVG = hardenedAxoSVG' "hardened character renderer"
          require_marker "$pub/v1/reef.js" 'reefpreview-' "reef preview renderer"
          require_marker "$pub/v1/home-gillie.css" '#view-home #axo-svg [data-home-gill]' "home gill styling"
          require_marker "$pub/v1/home-gillie.css" '#phase2-tank-preview .v1-preview-axo-svg [data-home-gill]' "preview gill styling"
          require_marker "$pub/v1/home-gillie.css" '#phase2-tank-preview .v1-preview-axo-svg .axo-gill-vein' "preview gill vein styling"

          # Paywall presentation is owned by phase5-paywall.js: mascot-led hero,
          # StoreKit-verified trial gating, and live-price-only savings claims.
          require_file "$pub/phase5-paywall.js"
          require_file "$pub/phase5-paywall.css"
          require_marker "$pub/phase5-paywall.js" 'GilliePaywallPresenter' "paywall presenter API"
          require_marker "$pub/phase5-paywall.js" 'deriveTrialState' "StoreKit-verified trial gating"
          require_marker "$pub/phase5-paywall.js" 'introEligible !== true' "strict trial-eligibility gate"
          require_marker "$pub/phase5-paywall.js" 'data-gp-computed="true"' "live-price savings marker"
          require_marker "$pub/phase5-paywall.js" 'No payment due today' "trial dock copy"
          require_marker "$pub/phase5-paywall.js" 'Your selected Gillie Plus plan renews unless canceled.' "honest trial-timeline billing step"
          require_marker "$pub/phase5-paywall.js" 'Purchase canceled. Nothing was charged.' "temporary cancellation toast"
          require_marker "$pub/phase5-paywall.css" '.gp-hero-card' "aquarium hero styling"
          require_marker "$pub/phase5-paywall.css" '.gp-trial-timeline' "trial timeline styling"
          require_marker "$pub/phase5-paywall.css" '.gp-purchase-dock' "purchase dock styling"
          require_marker "$pub/phase5-paywall.css" 'prefers-reduced-motion' "reduced-motion fallback"
          forbid_marker "$pub/phase5-paywall.js" 'Save 37%' "hardcoded savings claim returned to the paywall"
          forbid_marker "$pub/phase5-paywall.css" 'position:sticky' "forbidden sticky positioning returned to the paywall"

          # Plus Value contributes post-purchase value only; it must not
          # rewrite or repackage the paywall.
          require_file "$pub/v1/plus-value.js"
          require_file "$pub/v1/plus-value.css"
          require_marker "$pub/v1/plus-value.js" 'plus-value-v1' "Plus value engine"
          require_marker "$pub/v1/plus-value.js" 'WEEKLY_REPORT_DAYS = 7' "seven-day report window"
          require_marker "$pub/v1/plus-value.js" 'DAILY_TARGET = 3' "three-action Reef chest"
          require_marker "$pub/v1/plus-value.js" 'PERFECT_TARGET = 5' "perfect-care bonus target"
          require_marker "$pub/v1/plus-value.js" 'WELCOME_PEARLS = 250' "welcome pearl grant"
          require_marker "$pub/v1/plus-value.js" 'claimPlusWelcomeBundle' "native welcome-bundle claim"
          require_marker "$pub/v1/plus-value.js" 'Your Weekly Pattern Report' "weekly pattern report"
          require_marker "$pub/v1/plus-value.js" 'First tank mate included' "included buddy adoption"
          forbid_marker "$pub/v1/plus-value.js" 'repackagePaywall' "Plus value regained paywall ownership"
          forbid_marker "$pub/v1/plus-value.js" 'pv-paywall-showcase' "Plus value paywall showcase returned"
          require_marker "$pub/v1/plus-value.css" '#view-progress .v1-weekly-report' "weekly report styling"
          require_marker "$pub/v1/plus-value.css" '#view-reef .pv-perfect-care' "perfect-care styling"
          require_marker "$pub/v1/plus-value.css" '#pv-plus-welcome' "welcome overlay styling"

          require_file "$pub/v1/visual-integrity.js"
          require_marker "$pub/v1/visual-integrity.js" 'v1-renewal-disclosure' "visible renewal disclosure"
          require_marker "$pub/v1/visual-integrity.js" 'renews automatically unless cancelled at least 24 hours' "complete renewal language"
          require_marker "$pub/v1/visual-integrity.js" 'v1ManageSubscription' "active-subscriber management"
          require_marker "$pub/v1/visual-integrity.js" 'data-gp-computed' "StoreKit-only savings-claim guard"

          # Checkout ownership: one capture-phase director, direct native purchase.
          require_file "$pub/v1/purchase-director.js"
          require_marker "$pub/v1/purchase-director.js" 'purchase-director-v2-direct-native' "single-owner checkout director"
          require_marker "$pub/v1/purchase-director.js" 'selected-product-direct-to-storekit-v1' "selected-product checkout mode"
          require_marker "$pub/v1/purchase-director.js" 'native.purchase({ productId: product.id })' "direct native purchase call"
          require_marker "$pub/v1/purchase-director.js" 'GillieEntitlementSync.apply' "verified entitlement application"
          forbid_marker "$pub/v1/purchase-director.js" 'await availablePlan(' "obsolete JavaScript pricing preflight returned"

          require_file "$pub/v1/store-pricing.js"
          require_file "$pub/v1/accessibility.js"
          require_file "$pub/v1/sos-support.js"
          require_file "$pub/v1/welcome-recovery.js"
          require_file "$pub/v1/purchase-flow.js"
          require_file "$pub/v1/theme-engine.js"
          require_file "$pub/v1/theme-paint.js"
          require_file "$pub/v1/build-source.json"
          require_file "$pub/v1/launch-experience.js"
          require_file "$pub/v1/launch-experience.css"
          require_file "$pub/v1/support-recovery.css"
          require_marker "$pub/v1/store-pricing.js" 'store-pricing-v2-retryable' "retryable StoreKit pricing engine"
          require_marker "$pub/v1/store-pricing.js" 'Loading Apple price' "Apple-price loading state"
          require_marker "$pub/v1/store-pricing.js" 'introEligible' "introductory-offer eligibility passthrough"
          require_marker "$pub/v1/accessibility.js" 'accessibility-v1' "accessibility engine"
          require_marker "$pub/v1/accessibility.js" 'normalizeViewportContent' "scalable viewport contract"
          require_marker "$pub/v1/accessibility.js" 'aria-modal' "dialog accessibility contract"
          require_marker "$pub/v1/sos-support.js" 'sos-support-v1' "SOS support engine"
          require_marker "$pub/v1/sos-support.js" '1-800-QUIT-NOW' "quitline support resource"
          require_marker "$pub/v1/welcome-recovery.js" 'welcome-recovery-v1' "welcome recovery engine"
          require_marker "$pub/v1/welcome-recovery.js" 'recoverWelcomeBundle' "native welcome recovery call"
          require_marker "$pub/v1/purchase-flow.js" 'purchase-flow-v3-production-branch' "purchase diagnostics engine"
          require_marker "$pub/v1/purchase-flow.js" 'Apple returned zero Gillie Plus products' "zero-product diagnosis"
          require_marker "$pub/v1/purchase-flow.js" 'Copy purchase details' "purchase diagnostics action"
          require_marker "$pub/v1/purchase-flow.js" 'entitlementChanged' "native entitlement listener"
          require_marker "$pub/v1/theme-engine.js" 'theme-engine-v2-multitank-level-rewards' "theme engine"
          require_marker "$pub/v1/theme-engine.js" 'gillie:theme-applied' "theme-applied event"
          require_marker "$pub/v1/theme-engine.js" 'GillieThemeEngine' "theme engine API"
          require_marker "$pub/v1/theme-paint.js" 'theme-paint-v1' "tank painter"
          require_marker "$pub/v1/theme-paint.js" 'gillie:theme-painted' "theme-painted event"
          require_marker "$pub/v1/build-source.json" '"sourceCommit"' "build provenance commit"
          require_marker "$pub/v1/build-source.json" '"commerceEngine": "purchase-flow-v3-production-branch"' "commerce provenance"
          require_marker "$pub/v1/build-source.json" '"checkoutEngine": "purchase-director-v2-direct-native"' "checkout provenance"
          require_marker "$pub/v1/build-source.json" '"themePaintEngine": "theme-paint-v1"' "theme paint provenance"
          require_marker "$pub/v1/launch-experience.js" 'launch-experience-v1' "launch experience engine"
          require_marker "$pub/v1/launch-experience.js" 'Stay clean · Keep the water clear' "launch intro copy"
          require_marker "$pub/v1/launch-experience.js" 'first_setup_rating_prompt_shown' "rating prompt gate"
          require_marker "$pub/v1/launch-experience.js" 'requestNativeReview' "native review request"
          require_marker "$pub/v1/launch-experience.js" 'Rate Gillie' "rating prompt copy"
          require_marker "$pub/v1/launch-experience.css" 'gillieLaunchSwimIn' "launch intro animation"
          require_marker "$pub/v1/launch-experience.css" '.gillie-rating-overlay' "rating overlay styling"
          require_marker "$pub/index.html" 'id="toast" role="status" aria-live="polite" aria-atomic="true"' "accessible toast markup"

          if grep -R -qE 'fonts\.googleapis\.com|fonts\.gstatic\.com' "$pub"; then
            echo "Final IPA verification failed: remote Google Fonts are still referenced in the signed bundle"
            exit 1
          fi

          node scripts/verify-final-web-assets.js "$app_path/public"
          rm -rf "$verify_dir"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
