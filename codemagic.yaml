workflows:
  ios-capacitor-app-store:
    name: Gillie iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic

    environment:
      node: latest
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.lavish9999.gillie"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: "com.lavish9999.gillie"

    scripts:
      - name: Install npm dependencies
        script: |
          npm install

      - name: Prepare Capacitor web assets
        script: |
          if npm run | grep -q "prepare:cap"; then
            npm run prepare:cap
          fi

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Flatten iOS app icons
        script: |
          cat > /tmp/flatten-ios-icons.swift <<'SWIFT'
          import AppKit
          import Foundation

          enum IconError: Error {
            case unreadable(String)
            case context(String)
            case pngData(String)
          }

          func flattenIcon(at path: String) throws {
            let url = URL(fileURLWithPath: path)
            guard let image = NSImage(contentsOf: url),
                  let tiff = image.tiffRepresentation,
                  let sourceRep = NSBitmapImageRep(data: tiff) else {
              throw IconError.unreadable(path)
            }

            let width = sourceRep.pixelsWide
            let height = sourceRep.pixelsHigh
            guard let outputRep = NSBitmapImageRep(
              bitmapDataPlanes: nil,
              pixelsWide: width,
              pixelsHigh: height,
              bitsPerSample: 8,
              samplesPerPixel: 3,
              hasAlpha: false,
              isPlanar: false,
              colorSpaceName: .deviceRGB,
              bytesPerRow: 0,
              bitsPerPixel: 0
            ) else {
              throw IconError.context(path)
            }

            outputRep.size = NSSize(width: width, height: height)
            NSGraphicsContext.saveGraphicsState()
            NSGraphicsContext.current = NSGraphicsContext(bitmapImageRep: outputRep)
            NSColor(red: 3.0 / 255.0, green: 47.0 / 255.0, blue: 59.0 / 255.0, alpha: 1.0).setFill()
            NSRect(x: 0, y: 0, width: width, height: height).fill()
            image.draw(in: NSRect(x: 0, y: 0, width: width, height: height), from: .zero, operation: .sourceOver, fraction: 1.0)
            NSGraphicsContext.restoreGraphicsState()

            guard let data = outputRep.representation(using: .png, properties: [:]) else {
              throw IconError.pngData(path)
            }
            try data.write(to: url)
            print("Flattened \(path)")
          }

          for path in CommandLine.arguments.dropFirst() {
            try flattenIcon(at: path)
          }
          SWIFT

          swift /tmp/flatten-ios-icons.swift ios/App/App/Assets.xcassets/AppIcon.appiconset/*.png
          for icon in ios/App/App/Assets.xcassets/AppIcon.appiconset/*.png; do
            if sips -g hasAlpha "$icon" | grep -q "hasAlpha: yes"; then
              echo "App icon still has alpha: $icon"
              exit 1
            fi
          done

      - name: Install CocoaPods dependencies if present
        script: |
          if [ -f "ios/App/Podfile" ]; then
            cd ios/App
            pod install
          fi

      - name: Set up App Store code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build App Store IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true