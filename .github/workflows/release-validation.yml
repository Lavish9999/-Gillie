name: Gillie Release Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Generate and inspect final web assets
        run: |
          set +e
          npm run prepare:cap > prepare-cap.log 2>&1
          prepare_code=$?
          if [ "$prepare_code" = "0" ]; then
            node scripts/verify-final-web-assets.js www > final-web-verification.log 2>&1
            verification_code=$?
          else
            printf 'Final web verification did not run because prepare:cap failed.\n' > final-web-verification.log
            verification_code=99
          fi
          set -e
          echo "$prepare_code" > prepare-cap.exit
          echo "$verification_code" > final-web-verification.exit
          cat prepare-cap.log
          cat final-web-verification.log

      - name: Upload generated web verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-web-verification
          path: |
            prepare-cap.log
            prepare-cap.exit
            final-web-verification.log
            final-web-verification.exit
            www
          retention-days: 3

      - name: Enforce generated web verification
        run: |
          cat prepare-cap.log
          cat final-web-verification.log
          test "$(cat prepare-cap.exit)" = "0"
          test "$(cat final-web-verification.exit)" = "0"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Validate release source and generated bundle
        run: npm run validate:ship

      - name: Verify release privacy, paywall, reset, and target markers
        run: |
          grep -q 'NSPrivacyAccessedAPICategoryUserDefaults' ios/App/App/PrivacyInfo.xcprivacy
          grep -q 'CA92.1' ios/App/App/PrivacyInfo.xcprivacy
          grep -q 'PrivacyInfo.xcprivacy in Resources' ios/App/App.xcodeproj/project.pbxproj
          grep -q 'TARGETED_DEVICE_FAMILY = 1;' ios/App/App.xcodeproj/project.pbxproj
          grep -q 'clearDiagnostics' www/index.html
          grep -q 'localStorage.clear()' www/index.html
          grep -q 'GilliePurchases?.clearDiagnostics' ios/App/App/GillieBridgeViewController.swift
          grep -q 'localStorage.clear()' ios/App/App/GillieBridgeViewController.swift
          grep -q '"reefProgress", "moonlitReef"' www/v1/backup.js
          grep -q 'v1-renewal-disclosure' www/v1/visual-integrity.js
          grep -q 'renews automatically unless cancelled at least 24 hours' www/v1/visual-integrity.js
          grep -q 'v1ManageSubscription' www/v1/visual-integrity.js
          grep -q '.v1-renewal-disclosure' www/v1/visual-integrity.css
          if grep -qE 'fonts\.googleapis\.com|fonts\.gstatic\.com' www/index.html; then
            echo 'Remote Google Fonts remain in the native bundle'
            exit 1
          fi
