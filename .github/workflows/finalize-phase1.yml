name: Finalize Gillie Phase 1 source

on:
  push:
    branches:
      - phase-1-mrr-foundation

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase-1-mrr-foundation
          fetch-depth: 0

      - name: Merge canonical paywall and production runtime
        shell: bash
        run: |
          set -euo pipefail

          if ! grep -q 'plus-tank-hero' index.html; then
            test -f scripts/gillie-plus-paywall.patch
            git apply --check scripts/gillie-plus-paywall.patch
            git apply --whitespace=nowarn scripts/gillie-plus-paywall.patch
          fi

          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')
          html = html.replace('<meta name="theme-color" content="#075E5A">', '<meta name="theme-color" content="#E8F2EF">')
          html = html.replace('html{height:100%}', 'html{height:100%;background:var(--bg)}')
          marker = '<script src="./phase1-runtime.js"></script>'
          if marker not in html:
              html = html.replace('</body>', f'{marker}\n</body>')
          if 'plus-tank-hero' not in html:
              raise SystemExit('Final paywall marker missing after integration')
          path.write_text(html, encoding='utf-8')
          PY

          rm -f scripts/gillie-plus-paywall.patch
          rm -f .github/workflows/finalize-phase1.yml

          node --check phase1-runtime.js
          node --check scripts/prepare-capacitor-web.js
          grep -q 'plus-tank-hero' index.html
          grep -q '<script src="./phase1-runtime.js"></script>' index.html

      - name: Commit canonical source
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet && git diff --cached --quiet; then
            echo 'Canonical source already finalized.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Finalize Gillie Phase 1 canonical source'
          git push origin HEAD:phase-1-mrr-foundation
