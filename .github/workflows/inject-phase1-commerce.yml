name: Inject Gillie Phase 1 commerce runtime

on:
  push:
    branches:
      - phase-1-mrr-foundation

permissions:
  contents: write

jobs:
  inject:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase-1-mrr-foundation
          fetch-depth: 0

      - name: Add commerce runtime to canonical source
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          html = path.read_text(encoding='utf-8')
          runtime = '<script src="./phase1-runtime.js"></script>'
          commerce = '<script src="./phase1-commerce.js"></script>'
          if commerce not in html:
              if runtime not in html:
                  raise SystemExit('Phase 1 runtime marker missing')
              html = html.replace(runtime, runtime + '\n' + commerce, 1)
          path.write_text(html, encoding='utf-8')
          PY
          node --check phase1-runtime.js
          node --check phase1-commerce.js
          node --check scripts/prepare-capacitor-web.js
          grep -q '<script src="./phase1-commerce.js"></script>' index.html
          rm -f .github/workflows/inject-phase1-commerce.yml

      - name: Commit canonical runtime wiring
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Wire Phase 1 commerce runtime into Gillie'
          git push origin HEAD:phase-1-mrr-foundation
