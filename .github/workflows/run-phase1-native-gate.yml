name: Run Gillie Phase 1 native gate

on:
  push:
    branches:
      - phase-1-mrr-foundation

permissions:
  contents: write

jobs:
  native-gate:
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase-1-mrr-foundation
          fetch-depth: 0

      - name: Run production validation and iOS compile
        shell: bash
        run: |
          set +e
          log="$RUNNER_TEMP/gillie-phase1-native-gate.log"
          {
            echo '=== npm install ==='
            npm install
            install_status=$?
            echo "npm_install_status=$install_status"

            if [ "$install_status" -eq 0 ]; then
              echo '=== npm run validate:phase1 ==='
              npm run validate:phase1
              validate_status=$?
            else
              validate_status=99
            fi
            echo "validate_status=$validate_status"

            if [ "$validate_status" -eq 0 ]; then
              echo '=== npx cap sync ios ==='
              npx cap sync ios
              sync_status=$?
            else
              sync_status=99
            fi
            echo "cap_sync_status=$sync_status"

            if [ "$sync_status" -eq 0 ]; then
              echo '=== xcodebuild ==='
              xcodebuild \
                -project ios/App/App.xcodeproj \
                -scheme App \
                -configuration Debug \
                -sdk iphonesimulator \
                -destination 'generic/platform=iOS Simulator' \
                CODE_SIGNING_ALLOWED=NO \
                build
              build_status=$?
            else
              build_status=99
            fi
            echo "xcodebuild_status=$build_status"
          } >"$log" 2>&1

          overall=pass
          if ! grep -q 'npm_install_status=0' "$log" || \
             ! grep -q 'validate_status=0' "$log" || \
             ! grep -q 'cap_sync_status=0' "$log" || \
             ! grep -q 'xcodebuild_status=0' "$log"; then
            overall=fail
          fi

          {
            echo '# Gillie Phase 1 Native Gate'
            echo
            echo "**Result:** $overall"
            echo "**Commit tested:** $GITHUB_SHA"
            echo "**Runner:** macos-latest"
            echo
            echo '## Status lines'
            echo '```text'
            grep -E '^(npm_install_status|validate_status|cap_sync_status|xcodebuild_status)=' "$log" || true
            echo '```'
            echo
            echo '## Relevant log tail'
            echo '```text'
            tail -n 220 "$log"
            echo '```'
          } > PHASE1-CI-RESULT.md

          rm -f .github/workflows/run-phase1-native-gate.yml

      - name: Commit gate result
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Record Gillie Phase 1 native gate result'
          git push origin HEAD:phase-1-mrr-foundation
